server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Trust the Cloudflare proxy hop in front so client_real_ip is right
  # if we ever decide to log access here.
  set_real_ip_from 0.0.0.0/0;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # gzip the bundle aggressively. brotli would be nicer but the alpine
  # image doesn't ship the module by default and the marginal savings
  # over gzip aren't worth carrying a custom build.
  gzip on;
  gzip_types application/javascript text/javascript text/css text/html;
  gzip_min_length 256;
  gzip_proxied any;

  # Loader bundle: short cache + immutable, but with a "must-revalidate"
  # so the browser checks once when the cache TTL elapses. We bump the
  # filename via the deploy commit hash on iter 2.1, which makes long
  # `max-age` safe.
  location = /loader.js {
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    # CORS — storefronts on whatever origin should be able to load this
    # script, by definition.
    add_header Access-Control-Allow-Origin "*" always;
    types { } default_type application/javascript;
  }

  # Anything else (root index.html mostly) — short cache, no special
  # headers. Don't expose listing.
  location / {
    autoindex off;
    add_header Cache-Control "public, max-age=60" always;
    try_files $uri $uri/ =404;
  }

  # Health-check path nginx default. The Dockerfile uses `/loader.js`
  # against localhost so we don't expose a separate /healthz publicly.
}
