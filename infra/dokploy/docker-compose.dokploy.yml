# Production stack deployed via Dokploy (Hostinger VPS).
# - Build images locally (or in CI) and push to a registry, OR rely on
#   Dokploy's `build` mode which builds from the linked Git repo.
# - Secrets come from Dokploy's encrypted env store, NOT from a local .env.
# - Cloudflare proxies datapp.com.ar → admin:3001 and
#   api.datapp.com.ar → api:3000.

name: datapp

x-api-env: &api-env
  NODE_ENV: production
  LOG_LEVEL: info
  DATABASE_URL: ${DATABASE_URL}
  DIRECT_URL: ${DIRECT_URL}
  REDIS_URL: ${REDIS_URL}
  AUTH_SECRET: ${AUTH_SECRET}
  JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
  ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
  APP_URL_API: ${APP_URL_API}
  APP_URL_ADMIN: ${APP_URL_ADMIN}
  CORS_ALLOWED_ORIGINS: ${APP_URL_ADMIN}
  MAGENTO_BASE_URL: ${MAGENTO_BASE_URL}
  MAGENTO_ADMIN_TOKEN: ${MAGENTO_ADMIN_TOKEN}
  MAGENTO_HMAC_SECRET: ${MAGENTO_HMAC_SECRET}
  MAGENTO_RATE_LIMIT_RPS: '4'
  SENTRY_DSN_API: ${SENTRY_DSN_API:-}
  SENTRY_ENVIRONMENT: production
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_FROM: ${SMTP_FROM:-Datapp <no-reply@datapp.com.ar>}
  DEFAULT_TIMEZONE: America/Argentina/Buenos_Aires
  DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG}
  FEATURE_2FA_ENFORCED: ${FEATURE_2FA_ENFORCED:-true}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  OWNER_EMAIL: ${OWNER_EMAIL:-}
  # Phase 3 — abandoned-cart recovery vertical (ADR 0007).
  # Engine off-by-default; turn on by setting EMAIL_ENGINE_ENABLED=true
  # in Dokploy's env store. The other vars are required at runtime; the
  # boot validation in apps/api/src/config/env.ts only enforces
  # MAGENTO_STOREFRONT_URL when the engine is enabled.
  EMAIL_ENGINE_ENABLED: ${EMAIL_ENGINE_ENABLED:-false}
  EMAIL_DRY_RUN: ${EMAIL_DRY_RUN:-true}
  EMAIL_TEST_RECIPIENT_ALLOWLIST: ${EMAIL_TEST_RECIPIENT_ALLOWLIST:-matias.caravante@gmail.com}
  EMAIL_FREQUENCY_CAP_24H: ${EMAIL_FREQUENCY_CAP_24H:-3}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-CDP <no-reply@datapp.com.ar>}
  RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
  RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
  MAGENTO_STOREFRONT_URL: ${MAGENTO_STOREFRONT_URL:-}

services:
  # One-shot migration job. Runs `prisma migrate deploy` and exits 0 when
  # the schema is up to date. api/worker/admin all wait on this so they
  # never start against an out-of-date schema. Dokploy + docker-compose
  # honor `service_completed_successfully` and won't re-run this on
  # restart of dependents.
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: api
    image: datapp-api:latest
    restart: 'no'
    environment:
      <<: *api-env
      MIGRATE_ON_BOOT: 'true'
    # Override the entrypoint to run migrations and exit instead of
    # exec'ing the API server.
    entrypoint: ['/usr/local/bin/entrypoint-api.sh']
    command: ['true']
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: api
    image: datapp-api:latest
    restart: unless-stopped
    environment:
      <<: *api-env
      PORT: '3000'
      # The `migrate` job already ran (depends_on gate), and
      # `prisma migrate deploy` is idempotent + advisory-locked. Skip
      # the boot-time check to shave a couple of seconds off cold start.
      MIGRATE_ON_BOOT: 'false'
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    expose: ['3000']
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('node:http').get('http://localhost:3000/v1/health/live', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s

  # Worker shares the api image — only the CMD changes. Targeting the
  # same `api` stage means BuildKit deduplicates 100% of the layers with
  # the api/migrate builds (full cache hit), so the second `build:`
  # entry is effectively free but keeps a lone `worker` redeploy safe.
  worker:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: api
    image: datapp-api:latest
    restart: unless-stopped
    environment:
      <<: *api-env
      MIGRATE_ON_BOOT: 'false'
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    entrypoint: ['/usr/bin/tini', '--']
    command: ['node', 'dist/worker.js']
    working_dir: /app/apps/api
    stop_grace_period: 30s

  admin:
    build:
      context: ../..
      dockerfile: infra/docker/admin.Dockerfile
      args:
        # NEXT_PUBLIC_* values must be present at build time — they're
        # inlined into the client JS bundle.
        NEXT_PUBLIC_SENTRY_DSN_ADMIN: ${NEXT_PUBLIC_SENTRY_DSN_ADMIN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: production
    image: datapp-admin:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3001'
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${APP_URL_ADMIN}
      APP_URL_API: http://api:3000
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      SENTRY_DSN_ADMIN: ${SENTRY_DSN_ADMIN:-}
      SENTRY_ENVIRONMENT: production
      DEFAULT_TIMEZONE: America/Argentina/Buenos_Aires
    depends_on:
      migrate: { condition: service_completed_successfully }
      api: { condition: service_healthy }
    expose: ['3001']
    stop_grace_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-datapp}
    command: ['postgres', '-c', 'max_connections=200', '-c', 'shared_buffers=512MB']
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-datapp} -d ${POSTGRES_DB:-datapp}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--save',
        '60 1000',
        '--maxmemory-policy',
        'noeviction',
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

# DATA SAFETY — please read before changing anything in this block.
#
# These volumes resolve to "<compose_project>_postgres_data" /
# "<compose_project>_redis_data" by default. The compose project name
# can change if Dokploy is reset / rebuilt / the app is recreated —
# which silently mounts a fresh empty volume and leaves the previous
# one orphaned, losing all data from the application's perspective.
#
# Migration steps to pin onto stable, external names — the operator
# RUNS this on the VPS, NOT a code change:
#   docs/runbooks/postgres-volume-pin.md
# After the migration, edit this block to:
#
#   volumes:
#     postgres_data:
#       name: datapp_postgres_data
#       external: true
#     redis_data:
#       name: datapp_redis_data
#       external: true
#
# Until then, the real defense against silent volume loss is scheduled
# `pg_dump` to off-host storage. See infra/backups/.
volumes:
  postgres_data:
  redis_data:
