# Local development services. Apps run on the host (`pnpm dev`) and connect
# here. Production uses `infra/dokploy/docker-compose.dokploy.yml`.

name: cdp-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: cdp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cdp
      POSTGRES_PASSWORD: cdp
      POSTGRES_DB: cdp
      # Tune for dev only.
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    command: ['postgres', '-c', 'max_connections=200', '-c', 'shared_buffers=256MB']
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cdp -d cdp']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cdp-redis
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--save',
        '60 1000',
        '--maxmemory-policy',
        'noeviction',
      ]
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: cdp-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  redis_data:
