name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: '10.33.0'
  NODE_VERSION: '22.11.0'

jobs:
  # ----------------------------------------------------------------------
  # Static checks: format, lint, type-check, unit tests, package build.
  # No services needed — the unit suite uses in-memory mocks.
  # ----------------------------------------------------------------------
  static:
    name: Static + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cdp/db generate
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Build workspace packages
        run: |
          pnpm --filter @cdp/shared build
          pnpm --filter @cdp/magento-client build

      - name: Format check
        run: pnpm format:check

      - name: Type-check (api)
        run: pnpm --filter @cdp/api type-check

      - name: Type-check (admin)
        run: pnpm --filter @cdp/admin type-check

      - name: Unit tests (api)
        run: pnpm --filter @cdp/api test

      - name: Build api
        run: pnpm --filter @cdp/api build

      - name: Build admin
        run: pnpm --filter @cdp/admin build
        env:
          NODE_ENV: production

  # ----------------------------------------------------------------------
  # Integration: boots the API against ephemeral Postgres + Redis and
  # exercises the HMAC ingest pipeline end-to-end via Supertest/fetch.
  # ----------------------------------------------------------------------
  e2e:
    name: E2E (ingest pipeline)
    runs-on: ubuntu-latest
    needs: [static]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cdp
          POSTGRES_PASSWORD: cdp
          POSTGRES_DB: cdp
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U cdp -d cdp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://cdp:cdp@localhost:5432/cdp?schema=public
      DIRECT_URL: postgresql://cdp:cdp@localhost:5432/cdp?schema=public
      REDIS_URL: redis://localhost:6379/0
      PORT: '3010'
      LOG_LEVEL: warn
      APP_URL_API: http://localhost:3010
      APP_URL_ADMIN: http://localhost:3001
      CORS_ALLOWED_ORIGINS: http://localhost:3001
      MAGENTO_RATE_LIMIT_RPS: '4'
      DEFAULT_TIMEZONE: America/Argentina/Buenos_Aires
      DEFAULT_TENANT_SLUG: ci-tenant
      FEATURE_2FA_ENFORCED: 'false'
      MAGENTO_BASE_URL: http://magento.invalid
      MAGENTO_ADMIN_TOKEN: ci-token
      MAGENTO_HMAC_SECRET: ci-hmac-secret
      E2E_API_URL: http://localhost:3010

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cdp/db generate

      - name: Apply migrations
        run: pnpm --filter @cdp/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed
        run: pnpm --filter @cdp/db exec tsx prisma/seed.ts

      - name: Build workspace packages
        run: |
          pnpm --filter @cdp/shared build
          pnpm --filter @cdp/magento-client build

      - name: Build api
        run: pnpm --filter @cdp/api build

      - name: Generate runtime crypto material
        run: |
          openssl genpkey -algorithm RSA -out /tmp/priv.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -in /tmp/priv.pem -pubout -out /tmp/pub.pem
          {
            echo "AUTH_SECRET=$(openssl rand -base64 32)"
            echo "ENCRYPTION_MASTER_KEY=$(openssl rand -hex 32)"
            echo "JWT_PRIVATE_KEY<<__EOF__"
            cat /tmp/priv.pem
            echo "__EOF__"
            echo "JWT_PUBLIC_KEY<<__EOF__"
            cat /tmp/pub.pem
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Boot API
        run: |
          node apps/api/dist/main.js > /tmp/cdp-api.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:3010/v1/health > /dev/null; then
              echo "API up after $i second(s)"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          cat /tmp/cdp-api.log
          exit 1

      - name: Run e2e tests
        run: pnpm --filter @cdp/api test:e2e

      - name: API logs (on failure)
        if: failure()
        run: cat /tmp/cdp-api.log
